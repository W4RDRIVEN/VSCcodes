<html>
    <head>
        <style>
            .dotted{border: 2px dotted red;text-align: center;font-weight: bold;padding: 25px;font-size: 20px;margin: 5px;}
            .solid{border: 2px solid orangered;text-align: center;font-weight: bolder;padding: 25px;font-size: 20px;margin: 5px;}
            .double{border: 2px double black;text-align: center;font-weight: lighter;padding: 25px;font-size: 20px;margin: 5px;}
            .dashed{border: 2px dashed maroon;text-align: center;font-weight: bold;padding: 25px;font-size: 20px;margin: 5px;}
        </style>
    </head>
    <body>
        <p class="dotted">the text with dotted border</p>
        <p class="solid">the text with solid border</p>
        <p class="double">the text with double border</p>
        <p class="dashed">the text with dashed border</p>
    </body>
</html>
