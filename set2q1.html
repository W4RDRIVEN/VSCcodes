<html>
  <head>
    <title>My Page</title>
  </head>
  <body>
    <form>
       <fieldset>
        <legend>calculator thingy</legend>
        <br>
        <input type="number" id="number1" name="num1"><br>
        <input type="number" id="number2" name="num2"><br>
        <input type="button" name="submit" value="submit" onclick="calculate()">
       </fieldset>
    </form>

    <script>
      
      function calculate()
      {
        var n1=Number(document.getElementById("number1").value);
        var n2=Number(document.getElementById("number2").value);

        var sum= n1 + n2;
        var prod= n1*n2;

        alert(sum);
        alert(prod);
      }
    </script>
  </body>
</html>
