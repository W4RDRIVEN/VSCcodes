<html>
    <head>
        <style>
              body{background-color:#292828;color:white; text-align: center;}

        </style>
    </head>
    <body>
        <h2 style="text-align: justify;">JavaScript loops</h2>
        <p> a loop with a <b>break</b> statement</p>

        <p id="demo"></p>

        <script>
            let text="";

            for(let i=0;i<10;i++)
            {if(i===3){break;} text+= "the number is " + i + "<br>";}

            document.getElementById("demo").innerHTML=text;
        </script>
    </body>
</html>
